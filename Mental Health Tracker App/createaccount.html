<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - MindBuddy</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#F8F0FF,#EADCF8);
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:400px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#9B59B6;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#B57EDC;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#9B59B6;
}

.login-link{
    text-align:center;
    margin-top:15px;
}

.login-link a{
    color:#9B59B6;
    text-decoration:none;
    font-weight:bold;
}

</style>

</head>
<body>

<div class="card">

    <h1>🌸 MindBuddy</h1>

    <p class="subtitle">
        Create Your Account
    </p>

    <form id="accountForm">

        <input
        type="text"
        id="fullName"
        placeholder="Full Name">

        <input
        type="email"
        id="email"
        placeholder="Email Address">

        <input
        type="date"
        id="dob">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password">

        <button type="submit">
            Create Account
        </button>

    </form>

    <div class="login-link">
        Already have an account?
        <a href="signinaccount.html">Login</a>
    </div>

</div>
<script>

document.getElementById("accountForm")
.addEventListener("submit", function(event){

event.preventDefault();

let fullName =
document.getElementById("fullName").value.trim();

let email =
document.getElementById("email").value.trim();

let dob =
document.getElementById("dob").value;

let password =
document.getElementById("password").value;

let confirmPassword =
document.getElementById("confirmPassword").value;

if(
fullName === "" ||
email === "" ||
dob === "" ||
password === "" ||
confirmPassword === ""
){
    alert("Please fill all fields!");
    return;
}

if(password !== confirmPassword){
    alert("Passwords do not match!");
    return;
}

localStorage.setItem("userName", fullName);
localStorage.setItem("userEmail", email);
localStorage.setItem("userDOB", dob);
localStorage.setItem("userPassword", password);

alert("Account Created Successfully! 💜");

window.location.href = "signinaccount.html";

});

</script>

</body>
</html>
