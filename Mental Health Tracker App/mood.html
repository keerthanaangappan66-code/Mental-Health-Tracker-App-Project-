<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Tracker</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card shadow-lg rounded-4 p-4 text-center" style="max-width:600px; width:100%;">

<h1 class="text-primary mb-3">😊 Mood Tracker</h1>

<p id="todayDate" class="text-muted"></p>

<h4 class="mb-4">How are you feeling today?</h4>

<div class="d-flex justify-content-center flex-wrap gap-3 mb-4">

<button class="btn btn-outline-warning rounded-circle fs-2"
style="width:80px;height:80px;"
onclick="saveMood('😄 Happy')">
😄
</button>

<button class="btn btn-outline-success rounded-circle fs-2"
style="width:80px;height:80px;"
onclick="saveMood('🙂 Good')">
🙂
</button>

<button class="btn btn-outline-secondary rounded-circle fs-2"
style="width:80px;height:80px;"
onclick="saveMood('😐 Okay')">
😐
</button>

<button class="btn btn-outline-primary rounded-circle fs-2"
style="width:80px;height:80px;"
onclick="saveMood('😔 Sad')">
😔
</button>

<button class="btn btn-outline-danger rounded-circle fs-2"
style="width:80px;height:80px;"
onclick="saveMood('😣 Stressed')">
😣
</button>

</div>

<h5 id="selectedMood" class="text-success mb-3"></h5>

<button class="btn btn-primary w-100"
onclick="window.location.href='index.html'">
🏠 Back to Home
</button>

</div>

<script>

// Today's Date
let today = new Date();

document.getElementById("todayDate").innerHTML =
today.toLocaleDateString('en-US',{
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

// Today's Key
let todayKey = "mood_" + new Date().toLocaleDateString();

// Check Saved Mood
let savedMood = localStorage.getItem(todayKey);

if(savedMood){
document.getElementById("selectedMood").innerHTML =
"Today's Mood : " + savedMood;
}

// Save Mood
function saveMood(mood){

localStorage.setItem(todayKey,mood);

document.getElementById("selectedMood").innerHTML =
"Today's Mood : " + mood;

alert("Mood Saved Successfully 💜");

}

</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
