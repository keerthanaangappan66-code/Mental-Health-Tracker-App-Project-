<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Your Pet</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#F8F0FF,#EADCF8);
min-height:100vh;
padding:20px;
}

h1{
text-align:center;
color:#9B59B6;
margin-bottom:25px;
}

.pet-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
max-width:900px;
margin:auto;
}

.pet-card{
background:white;
padding:15px;
border-radius:20px;
text-align:center;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.pet-card:hover{
transform:scale(1.05);
}

.pet-card.selected{
border:4px solid #9B59B6;
}

.pet-card img{
width:120px;
height:120px;
object-fit:contain;
}

.pet-card h3{
margin-top:10px;
color:#9B59B6;
}

.pet-name-box{
max-width:400px;
margin:30px auto;
text-align:center;
}

.pet-name-box input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
display:block;
margin:20px auto;
padding:12px 30px;
border:none;
border-radius:10px;
background:#B57EDC;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#9B59B6;
}

</style>
</head>
<body>

<h1>🐾 Choose Your Companion</h1>

<div class="pet-container">

<div class="pet-card" onclick="selectPet('Panda')">
<img src="panda.png">
<h3>🐼 Panda</h3>
</div>

<div class="pet-card" onclick="selectPet('Cat')">
<img src="cat.png">
<h3>🐱 Cat</h3>
</div>

<div class="pet-card" onclick="selectPet('Dog')">
<img src="dog.png">
<h3>🐶 Dog</h3>
</div>

<div class="pet-card" onclick="selectPet('Rabbit')">
<img src="rabbit.png">
<h3>🐰 Rabbit</h3>
</div>

</div>

<div class="pet-name-box">

<input
type="text"
id="petName"
placeholder="Give your pet a cute name">

</div>

<button onclick="savePet()">
Save Pet 💜
</button>

<script>

let selectedPet = "";

function selectPet(pet){

selectedPet = pet;

let cards =
document.querySelectorAll(".pet-card");

cards.forEach(card=>{
card.classList.remove("selected");
});

event.currentTarget.classList.add("selected");

}

function savePet(){

let petName =
document.getElementById("petName").value.trim();

if(selectedPet === ""){
alert("Please select a pet!");
return;
}

if(petName === ""){
alert("Please enter a pet name!");
return;
}

localStorage.setItem("petType",selectedPet);
localStorage.setItem("petName",petName);

alert("Pet Saved Successfully! 💜");

window.location.href="index.html";

}

</script>

</body>
</html>
