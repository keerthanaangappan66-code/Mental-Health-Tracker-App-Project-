<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - MindBuddy</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#F8F0FF,#EADCF8);
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:400px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#9B59B6;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#B57EDC;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#9B59B6;
}

.create-link{
    text-align:center;
    margin-top:15px;
}

.create-link a{
    color:#9B59B6;
    text-decoration:none;
    font-weight:bold;
}

</style>

</head>
<body>

<div class="card">

    <h1>🌸 MindBuddy</h1>

    <p class="subtitle">
        Login To Your Account
    </p>

    <form id="loginForm">

        <input
        type="email"
        id="email"
        placeholder="Email Address">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button type="submit">
            Login
        </button>

    </form>

    <div class="create-link">
        Don't have an account?
        <a href="createaccount.html">Create Account</a>
    </div>

</div>

<script>

document.getElementById("loginForm")
.addEventListener("submit", function(event){

event.preventDefault();

let email =
document.getElementById("email").value.trim();

let password =
document.getElementById("password").value;

if(email === "" || password === ""){
    alert("Please fill all fields!");
    return;
}

let savedEmail =
localStorage.getItem("userEmail");

let savedPassword =
localStorage.getItem("userPassword");

if(email !== savedEmail){
    alert("Invalid Email!");
    return;
}

if(password !== savedPassword){
    alert("Incorrect Password!");
    return;
}

alert("Login Successful! 💜");

window.location.href = "index.html";

});

</script>

</body>
</html>s
