<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindBuddy Breathing</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#F8F0FF,#EADCF8);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
text-align:center;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
width:90%;
max-width:500px;
}

h1{
color:#9B59B6;
margin-bottom:20px;
}

.circle{
width:180px;
height:180px;
background:#B57EDC;
border-radius:50%;
margin:20px auto;
transition:all 4s ease;
}

.inhale{
transform:scale(1.3);
}

.exhale{
transform:scale(1);
}

#instruction{
font-size:24px;
color:#4A235A;
margin:20px 0;
font-weight:bold;
}

.streak{
font-size:20px;
margin:15px 0;
color:#9B59B6;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#B57EDC;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#9B59B6;
}

</style>
</head>
<body>

<div class="container">

<h1>🧘 Breathing Exercise</h1>

<div class="streak">
🔥 Streak: <span id="streakCount">0</span> Days
</div>

<div class="circle" id="circle"></div>

<div id="instruction">
Press Start
</div>

<button onclick="startBreathing()">
▶ Start Breathing
</button>

<button onclick="completeSession()">
✅ Complete Today's Session
</button>

<button onclick="window.location.href='index.html'">
🏠 Back to Home
</button>

</div>

<script>

let circle = document.getElementById("circle");
let instruction = document.getElementById("instruction");

function startBreathing(){

instruction.innerHTML = "Inhale 🌬️";
circle.classList.add("inhale");

setTimeout(() => {

instruction.innerHTML = "Hold ✋";

},4000);

setTimeout(() => {

instruction.innerHTML = "Exhale 😌";
circle.classList.remove("inhale");
circle.classList.add("exhale");

},8000);

setTimeout(() => {

instruction.innerHTML = "Completed 💜";

},12000);

}

function completeSession(){

let today =
new Date().toDateString();

let lastDate =
localStorage.getItem("lastBreathingDate");

let streak =
parseInt(localStorage.getItem("breathingStreak")) || 0;

if(lastDate){

let last =
new Date(lastDate);

let current =
new Date(today);

let diff =
(current-last)/(1000*60*60*24);

if(diff === 1){
streak++;
}
else if(diff > 1){
streak = 1;
}
}
else{
streak = 1;
}

if(lastDate === today){
alert("Today's session already completed 💜");
return;
}

localStorage.setItem(
"breathingStreak",
streak
);

localStorage.setItem(
"lastBreathingDate",
today
);

document.getElementById("streakCount")
.innerHTML = streak;

alert("Session Completed! 🔥");
}

let diff =
Math.floor((current - last) / (1000 * 60 * 60 * 24));

if(diff === 1){
    streak++;
}
else if(diff > 1){
    streak = 1;
}
</script>

</body>
</html>
